<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ceiling Tracker — Display</title>
  </head>
  <body class="display-body">
    <div id="root"></div>
    <div class="closest-widget-shell" aria-hidden="true">
      <iframe
        class="closest-widget-frame"
        src="/closest.html"
        title="Closest aircraft widget"
      ></iframe>
    </div>
    <script type="module" src="/src/display/main.tsx"></script>
    <script>
      (function () {
        const openClosest = () => {
          window.open('/closest.html', '_blank', 'noopener,noreferrer');
          document.removeEventListener('click', openClosest);
        };
        document.addEventListener('click', openClosest, { once: true });
      })();
    </script>
  </body>
</html>
